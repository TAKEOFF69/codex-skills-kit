name: Bug report
description: Report a broken install path, validator issue, typo, or stale claim.
title: "[bug]: "
labels:
  - bug
body:
  - type: textarea
    id: bug
    attributes:
      label: What is wrong?
      description: Describe the broken behavior or stale claim.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce or verify
      description: Include commands, links, or exact text. Do not include secrets.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include private code, customer data, secrets, tokens, or internal paths.
          required: true
